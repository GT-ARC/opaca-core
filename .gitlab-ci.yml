# using shared Shell runner with Java 21
variables:
  JAVA_HOME: "/usr/lib/jvm/temurin-21-jdk-amd64"
default:
  tags:
    - shared

stages:
  - build
  - test
  - deploy

mvn-build:
  stage: build
  script:
    - mvn package -DskipTests
    - docker build -t sample-agent-container-image examples/sample-container/

mvn-test:
  stage: test
  script:
    - mvn test

mvn-deploy:
  stage: deploy
  only:
    - main
  script:
    - mvn deploy -DskipTests
